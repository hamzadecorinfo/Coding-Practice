<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Insight</title>
    <link rel="stylesheet" href="file.css">
</head>
<body>
    <main class="auth-wrapper">
        <section class="login-card">
            <h1>Apna Profile Check Karein</h1>
            <p class="subtitle">Name, caste, aur date of birth enter karein</p>

            <form id="profileForm" novalidate>
                <label for="name">Aap ka naam</label>
                <input type="text" id="name" name="name" placeholder="Apna naam likhein" required>

                <label for="caste">Aap ki caste</label>
                <input type="text" id="caste" name="caste" placeholder="Apni caste likhein" required>

                <label for="dob">Date of birth</label>
                <input type="date" id="dob" name="dob" required>

                <button type="submit">Result Dekhein</button>
            </form>

            <p id="message" class="message" aria-live="polite"></p>
        </section>
    </main>

    <script src="practic.js"></script>
</body>
</html>
